services:
  postgres:
    image: postgres:16-alpine
    container_name: ai_newsletter_postgres
    environment:
      POSTGRES_USER: ai_newsletter
      POSTGRES_PASSWORD: ai_newsletter
      POSTGRES_DB: ai_newsletter
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_newsletter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
